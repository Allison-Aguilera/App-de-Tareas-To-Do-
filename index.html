<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-dark text-light">

  <div class="container py-5">

    <header class="text-center mb-5 py-4 rounded-3" style="background: linear-gradient(135deg, #4547b1, #82adc9);">
      <h1 class="display-4 fw-bold text-white">Mis Tareas</h1>
      <p class="lead text-white-50">Organiza tu día</p>
    </header>

    <!-- PROGRESO -->
    <div class="mb-4">
      <div class="d-flex justify-content-between mb-1">
        <small>Progreso</small>
        <small id="porcentaje">0%</small>
      </div>
      <div class="progress">
        <div id="barra-progreso" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
          aria-valuemin="0" aria-valuemax="100" style="width: 0%"></div>
      </div>
    </div>

    <!-- FORMULARIO PARA AGREGAR TAREA -->
    <div class="input-group mb-4">
      <input type="text" id="input-tarea" class="form-control" placeholder="Escribe una nueva tarea..."
        maxlength="100" />
      <button id="btn-agregar" class="btn btn-primary">Agregar</button>
    </div>

    <!-- FILTROS -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-outline-primary filtro" data-filtro="pendientes">Pendientes</button>
      <button class="btn btn-outline-primary filtro" data-filtro="completadas">Completadas</button>
      <button class="btn btn-outline-primary filtro activo" data-filtro="todas">Todas</button>
    </div>
    <!-- LISTA DE TAREAS -->
    <div class="card bg-secondary bg-opacity-10 border-secondary p-3 mb-4">
      <ul id="lista-tareas" class="list-group list-group-flush">
        <!-- las tareas se generan con JS -->
      </ul>
    </div>

    <!-- FOOTER -->
    <div class="d-flex justify-content-between align-items-center">
      <span id="contador" class="text-white">0 tareas pendientes</span>
      <button id="btn-limpiar" class="btn btn-outline-danger btn-sm">Limpiar completadas</button>
    </div>
    <footer class="text-center text-white py-4 mt-4">
      <small>© 2026 Evon Zelaya & Allison Aguilera · To-Do App</small>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
