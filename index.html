<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container py-5">

    <header class="text-center mb-4">
      <h1>Mis Tareas</h1>
      <p class="text-muted">Organiza tu día</p>
    </header>

    <!-- PROGRESO -->
    <div class="mb-4">
      <div class="d-flex justify-content-between mb-1">
        <small>Progreso</small>
        <small id="porcentaje">0%</small>
      </div>
      <div class="progress">
        <div id="barra-progreso" class="progress-bar" role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <!-- FORMULARIO PARA AGREGAR TAREA -->
    <div class="input-group mb-4">
      <input
        type="text"
        id="input-tarea"
        class="form-control"
        placeholder="Escribe una nueva tarea..."
        maxlength="100"
      />
      <button id="btn-agregar" class="btn btn-primary">Agregar</button>
    </div>

    <!-- FILTROS -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-outline-secondary filtro activo" data-filtro="todas">Todas</button>
      <button class="btn btn-outline-secondary filtro" data-filtro="pendientes">Pendientes</button>
      <button class="btn btn-outline-secondary filtro" data-filtro="completadas">Completadas</button>
    </div>

    <!-- LISTA DE TAREAS -->
    <ul id="lista-tareas" class="list-group mb-4">
      <!-- las tareas se generan con JS -->
    </ul>

    <!-- FOOTER -->
    <div class="d-flex justify-content-between align-items-center">
      <span id="contador" class="text-muted">0 tareas pendientes</span>
      <button id="btn-limpiar" class="btn btn-outline-danger btn-sm">Limpiar completadas</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
